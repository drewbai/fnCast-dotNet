# ─────────────────────────────────────────────────────────────────────────────
# fnCast Pipeline Definition
# File   : pipelines/hello-world.yaml
# Purpose: Minimal working pipeline — validates, extracts metadata, transforms,
#          and routes a plain-text event through all four pipeline stages.
#
# Schema version: 1.0
# Runtime       : fnCast-dotNet (IPipelineOrchestrator)
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: fncast/v1
kind: Pipeline
metadata:
  name: hello-world
  description: "Minimal end-to-end pipeline for bring-up validation."
  version: "1.0.0"
  tags:
    - demo
    - bringup

spec:
  # ── Trigger ────────────────────────────────────────────────────────────────
  # Accepted content types. Payloads with other types bypass JSON validation.
  triggers:
    - type: http
      route: /ingest
      methods: [POST]
      acceptedContentTypes:
        - text/plain
        - application/json

  # ── Inference config ───────────────────────────────────────────────────────
  inference:
    executor: PlaceholderInferenceExecutor
    mode: Uppercase           # Uppercase | Lowercase | Echo
    simulatedLatencyMs: 25    # artificial async delay in PlaceholderInferenceExecutor

  # ── Stages (declarative — maps to IPipelineOrchestrator stages) ────────────
  stages:
    - name: validate
      type: JsonEventValidator
      config:
        rejectOnInvalidJson: true   # returns ValidationResult.Failure on parse error

    - name: extract-metadata
      type: BasicMetadataExtractor
      config:
        fields:
          - eventId        # evt.Id
          - timestamp      # evt.Timestamp (Unix ms, InvariantCulture)
          - correlationId  # optional — from JSON root property if present
          - source         # optional — from JSON root property if present

    - name: infer
      type: PlaceholderInferenceExecutor
      config:
        mode: "{{ inference.mode }}"
        simulatedLatencyMs: "{{ inference.simulatedLatencyMs }}"

    - name: route
      type: LoggingOutputRouter
      config:
        logLevel:
          success: Information
          failure: Warning
        messageTemplate:
          success: "Inference succeeded for {EventId}: {Output}"
          failure: "Inference failed for {EventId}: {Errors}"

  # ── Expected outputs (used by run-sanity and fncast-doctor) ────────────────
  assertions:
    - field: success
      equals: true
    - field: output
      transform: toUpper
      input: "hello fncast"
      expected: "HELLO FNCAST"

  # ── Error handling ─────────────────────────────────────────────────────────
  errorPolicy:
    onValidationFailure: returnResult   # returns InferenceResult(success=false)
    onInferenceFailure:  returnResult
    onRoutingFailure:    log            # log and continue — routing is non-critical
